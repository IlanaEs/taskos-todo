<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#b79fff",
          "primary-container": "#ab8eff",
          "primary-dim": "#a88bff",
          "secondary": "#64b5f6",
          "secondary-dim": "#54a7e7",
          "tertiary": "#ff84aa",
          "tertiary-container": "#fd6c9c",
          "error": "#ff6e84",
          "error-dim": "#d73357",
          "background": "#0b0c1f",
          "surface": "#0b0c1f",
          "surface-dim": "#0b0c1f",
          "surface-container-lowest": "#000000",
          "surface-container-low": "#101126",
          "surface-container": "#16172e",
          "surface-container-high": "#1c1d36",
          "surface-container-highest": "#22233e",
          "surface-bright": "#282947",
          "surface-variant": "#22233e",
          "on-background": "#e4e3fe",
          "on-surface": "#e4e3fe",
          "on-surface-variant": "#a9a9c2",
          "on-primary": "#36008f",
          "on-primary-fixed": "#000000",
          "on-secondary": "#00314f",
          "on-tertiary": "#5e002b",
          "outline": "#73738b",
          "outline-variant": "#46465b",
          "inverse-on-surface": "#535369",
        },
        fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .glass-card {
    background: rgba(28, 29, 54, 0.60);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
  }
  .glass-high {
    background: rgba(34, 35, 62, 0.70);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
  }
  .ghost-border { outline: 1px solid rgba(115, 113, 139, 0.15); }
  .specular    { border: 1px solid rgba(228, 227, 254, 0.08); }

  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    opacity: 0.35;
    pointer-events: none;
  }
  .blob-1 { width:520px; height:520px; background:#b79fff; top:-120px; right:-120px; }
  .blob-2 { width:420px; height:420px; background:#64b5f6; bottom:-100px; left:-100px; }
  .blob-3 { width:300px; height:300px; background:#ff84aa; top:42%; left:28%; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    line-height: 1;
    font-size: 22px;
  }
  .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .no-scrollbar::-webkit-scrollbar { display:none; }
  .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

  /* Screen transitions */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Card animation */
  @keyframes popIn {
    from { opacity:0; transform: scale(0.92) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .card-animate { animation: popIn 0.22s cubic-bezier(.34,1.56,.64,1); }

  /* Error banner shake */
  @keyframes shake {
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-5px); }
    75%{ transform:translateX(5px); }
  }
  .shake { animation: shake 0.3s ease; }

  /* Progress glow */
  .progress-glow { box-shadow: 0 0 20px rgba(183,159,255,0.4); }

  body { min-height: 100dvh; }
</style>
</head>

<body class="bg-background text-on-background min-h-screen selection:bg-primary/30 pb-24">

<!-- Background blobs -->
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<!-- ── TOP APP BAR ── -->
<header class="fixed top-0 w-full z-50 bg-background/60 backdrop-blur-xl flex justify-between items-center px-5 h-16">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center">
      <span class="material-symbols-outlined icon-fill text-on-primary text-base">task_alt</span>
    </div>
    <span class="text-primary font-black text-xl tracking-tighter">TaskOS</span>
  </div>
  <div class="flex items-center gap-1">
    <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors active:scale-95" id="theme-btn">
      <span class="material-symbols-outlined text-on-surface-variant" id="theme-icon">dark_mode</span>
    </button>
  </div>
</header>

<!-- ══════════════════════════════════════
     SCREEN: DASHBOARD
══════════════════════════════════════ -->
<main class="screen active pt-20 pb-28 px-4 max-w-5xl mx-auto relative z-10" id="screen-dashboard">

  <!-- Hero: Daily Progress -->
  <section class="mb-8 mt-2">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-5">
      <div>
        <p class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-1" id="hero-date"></p>
        <h1 class="text-[2.6rem] font-black tracking-tight leading-none text-on-surface">Daily Progress</h1>
        <p class="text-on-surface-variant text-sm mt-1.5 font-medium" id="hero-sub">Add your first task to get started.</p>
      </div>
      <div class="glass-card ghost-border px-5 py-3 rounded-2xl flex gap-5">
        <div class="flex flex-col items-center">
          <span class="text-[10px] font-black tracking-widest uppercase text-on-surface-variant mb-1">Total</span>
          <span class="text-2xl font-black text-on-surface" id="stat-total">0</span>
        </div>
        <div class="w-px bg-outline-variant/40"></div>
        <div class="flex flex-col items-center">
          <span class="text-[10px] font-black tracking-widest uppercase text-secondary mb-1">Done</span>
          <span class="text-2xl font-black text-on-surface" id="stat-done">0</span>
        </div>
        <div class="w-px bg-outline-variant/40"></div>
        <div class="flex flex-col items-center">
          <span class="text-[10px] font-black tracking-widest uppercase text-tertiary mb-1">Left</span>
          <span class="text-2xl font-black text-on-surface" id="stat-left">0</span>
        </div>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="relative w-full h-3 bg-surface-container-high rounded-full overflow-hidden" id="progress-wrap" style="display:none">
      <div id="progress-fill" class="absolute top-0 left-0 h-full bg-gradient-to-r from-primary to-secondary rounded-full progress-glow transition-all duration-500" style="width:0%"></div>
    </div>
  </section>

  <!-- Category tabs -->
  <nav class="flex overflow-x-auto no-scrollbar gap-2.5 pb-1 mb-6" id="cat-bar"></nav>

  <!-- Filter row -->
  <div class="flex gap-2 mb-6 flex-wrap items-center">
    <button class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest filter-btn active-filter" data-f="all" onclick="setFilter('all')">All</button>
    <button class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest filter-btn glass-card ghost-border text-on-surface-variant" data-f="active" onclick="setFilter('active')">Active</button>
    <button class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest filter-btn glass-card ghost-border text-on-surface-variant" data-f="done" onclick="setFilter('done')">Done</button>
    <div class="flex-1"></div>
    <button onclick="clearDone()" class="px-4 py-1.5 rounded-full glass-card ghost-border text-xs font-bold uppercase tracking-widest text-error/70 hover:text-error hover:bg-error/10 transition-all">Clear Done</button>
  </div>

  <!-- Task grid -->
  <div class="columns-1 sm:columns-2 lg:columns-3 gap-4" id="cards-grid"></div>

</main>

<!-- ══════════════════════════════════════
     SCREEN: ADD / EDIT TASK
══════════════════════════════════════ -->
<main class="screen pt-20 pb-28 px-4 max-w-2xl mx-auto relative z-10" id="screen-form">

  <!-- Error banner -->
  <div id="error-banner" class="hidden fixed top-16 left-0 w-full z-50 bg-error/20 backdrop-blur-md flex items-center gap-2 px-5 py-3 border-b border-error/20 shake">
    <span class="material-symbols-outlined text-error text-sm">error</span>
    <p class="text-error text-xs font-bold uppercase tracking-widest" id="error-text">Task title cannot be empty.</p>
  </div>

  <div class="glass-card specular rounded-[2rem] p-7 mt-2 relative overflow-hidden">
    <div class="mb-7">
      <h2 class="text-3xl font-extrabold tracking-tight text-on-surface" id="form-title">New Task</h2>
      <p class="text-on-surface-variant text-sm mt-1">What needs to be done?</p>
    </div>

    <form class="space-y-7" onsubmit="return false">

      <!-- Title -->
      <div class="space-y-2">
        <label class="block text-[0.6875rem] font-black tracking-[0.05em] uppercase text-primary">Task Title</label>
        <input id="f-title" type="text" maxlength="120"
          class="w-full bg-surface-container-low/50 rounded-xl p-4 text-base font-semibold placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none ghost-border text-on-surface"
          placeholder="e.g. Design new landing page" />
      </div>

      <!-- Notes -->
      <div class="space-y-2">
        <label class="block text-[0.6875rem] font-black tracking-[0.05em] uppercase text-secondary">Notes</label>
        <textarea id="f-notes" rows="4" maxlength="600"
          class="w-full bg-surface-container-low/50 rounded-xl p-4 text-sm placeholder:text-outline/50 focus:ring-2 focus:ring-secondary/40 focus:bg-surface-container-high transition-all outline-none ghost-border resize-none text-on-surface"
          placeholder="Add some details about this task..."></textarea>
      </div>

      <!-- Category + Priority -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-7">
        <div class="space-y-3">
          <label class="block text-[0.6875rem] font-black tracking-[0.05em] uppercase text-tertiary">Category</label>
          <div class="flex flex-wrap gap-2" id="f-cat-group"></div>
        </div>
        <div class="space-y-3">
          <label class="block text-[0.6875rem] font-black tracking-[0.05em] uppercase text-outline">Priority</label>
          <div class="flex gap-2">
            <button type="button" class="flex-1 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all f-priority-btn" data-p="low" onclick="setFormPriority('low')">Low</button>
            <button type="button" class="flex-1 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all f-priority-btn" data-p="medium" onclick="setFormPriority('medium')">Medium</button>
            <button type="button" class="flex-1 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all f-priority-btn" data-p="high" onclick="setFormPriority('high')">High</button>
          </div>
        </div>
      </div>

      <!-- Deadline -->
      <div class="space-y-2">
        <label class="block text-[0.6875rem] font-black tracking-[0.05em] uppercase text-outline">Deadline <span class="normal-case font-normal text-on-surface-variant">(optional)</span></label>
        <div class="relative">
          <input id="f-deadline" type="date"
            class="w-full bg-surface-container-low/50 rounded-xl p-4 text-sm font-medium focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none ghost-border appearance-none text-on-surface" />
          <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-lg">calendar_today</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row gap-3 pt-2">
        <button type="button" onclick="submitTask()"
          class="flex-1 h-13 py-3.5 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-bold rounded-full shadow-[0_10px_25px_rgba(183,159,255,0.3)] active:scale-95 transition-transform flex items-center justify-center gap-2 text-sm">
          <span class="material-symbols-outlined text-lg">add</span>
          <span id="form-btn-label">Add Task</span>
        </button>
        <button type="button" onclick="showDashboard()"
          class="flex-1 h-13 py-3.5 bg-surface-container-high/40 text-on-surface-variant font-bold rounded-full ghost-border active:scale-95 transition-transform text-sm">
          Cancel
        </button>
      </div>
    </form>
  </div>
</main>

<!-- ── BOTTOM NAV ── -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-8 bg-surface-container-high/60 backdrop-blur-[25px] rounded-t-[1.5rem] z-50 shadow-[0px_-10px_40px_rgba(228,227,254,0.05)] ghost-border">
  <button onclick="showDashboard()" id="nav-home" class="flex flex-col items-center justify-center bg-gradient-to-br from-primary to-primary-container text-white rounded-full p-3 shadow-[0_0_15px_rgba(183,159,255,0.4)] active:scale-90 transition-transform">
    <span class="material-symbols-outlined icon-fill">home</span>
  </button>
  <button onclick="showAddForm()" id="nav-add" class="flex flex-col items-center justify-center text-on-surface-variant/70 p-3 hover:text-primary transition-all active:scale-90">
    <span class="material-symbols-outlined">add_circle</span>
  </button>
  <button onclick="showStats()" id="nav-stats" class="flex flex-col items-center justify-center text-on-surface-variant/70 p-3 hover:text-secondary transition-all active:scale-90">
    <span class="material-symbols-outlined">leaderboard</span>
  </button>
</nav>

<script>
// ── Data ──────────────────────────────────────────────
const CATS = {
  work:     { label:'Work',     color:'#64b5f6', twColor:'secondary' },
  personal: { label:'Personal', color:'#b79fff', twColor:'primary' },
  shopping: { label:'Shopping', color:'#54a7e7', twColor:'secondary-dim' },
  health:   { label:'Health',   color:'#ff84aa', twColor:'tertiary' },
  other:    { label:'Other',    color:'#a88bff', twColor:'primary-dim' },
};
const PRIORITY_STYLES = {
  low:    { label:'Low',    bg:'bg-slate-500/20', text:'text-slate-400',  active:'bg-slate-400/20 text-slate-300 shadow-[0_0_12px_rgba(148,163,184,0.2)]' },
  medium: { label:'Medium', bg:'bg-primary/20',   text:'text-primary',    active:'bg-primary/20 text-primary shadow-[0_0_12px_rgba(183,159,255,0.3)]' },
  high:   { label:'High',   bg:'bg-error/20',     text:'text-error',      active:'bg-error/20 text-error shadow-[0_0_12px_rgba(255,110,132,0.3)]' },
};
const MAX_TITLE = 100, MAX_NOTES = 500;

let tasks     = JSON.parse(localStorage.getItem('taskos-v4') || '[]');
let filter    = 'all';
let catFilter = 'all';
let formPriority = 'medium';
let formCat      = 'work';
let editId       = null;
let isDark       = localStorage.getItem('taskos-theme') !== 'light';

// ── Theme ─────────────────────────────────────────────
function applyTheme() {
  // Design is always dark-mode based (deep midnight), toggle just adjusts blobs/tones
  document.getElementById('theme-icon').textContent = isDark ? 'dark_mode' : 'light_mode';
  document.documentElement.style.setProperty('--blob-opacity', isDark ? '0.35' : '0.20');
  document.querySelectorAll('.bg-blob').forEach(b => b.style.opacity = isDark ? '0.35' : '0.18');
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('taskos-theme', isDark ? 'dark' : 'light');
  applyTheme();
}
applyTheme();

// ── Date helper ───────────────────────────────────────
function heroDate() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function fmtDeadline(d) {
  if (!d) return null;
  const dt    = new Date(d + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.round((dt - today) / 86400000);
  return {
    label:   diff === 0 ? 'Today!' : diff === 1 ? 'Tomorrow' : dt.toLocaleDateString('en-US', { month:'short', day:'numeric' }),
    overdue: diff < 0,
    today:   diff === 0,
  };
}

// ── Nav ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showDashboard() {
  editId = null;
  showScreen('screen-dashboard');
  updateNavState('home');
  render();
}
function showAddForm() {
  editId = null;
  resetForm();
  document.getElementById('form-title').textContent = 'New Task';
  document.getElementById('form-btn-label').textContent = 'Add Task';
  hideError();
  showScreen('screen-form');
  updateNavState('add');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}
function showEditForm(id) {
  editId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('f-title').value     = t.title;
  document.getElementById('f-notes').value     = t.notes || '';
  document.getElementById('f-deadline').value  = t.deadline || '';
  formCat      = t.cat;
  formPriority = t.priority;
  document.getElementById('form-title').textContent    = 'Edit Task';
  document.getElementById('form-btn-label').textContent = 'Save Changes';
  renderFormCats();
  renderFormPriority();
  hideError();
  showScreen('screen-form');
  updateNavState('add');
}
function showStats() {
  updateNavState('stats');
  // Future: stats screen. For now show dashboard.
  showDashboard();
}
function updateNavState(active) {
  const btns = { home:'nav-home', add:'nav-add', stats:'nav-stats' };
  Object.entries(btns).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (k === active) {
      el.classList.add('bg-gradient-to-br','from-primary','to-primary-container','text-white','rounded-full','shadow-[0_0_15px_rgba(183,159,255,0.4)]');
      el.classList.remove('text-on-surface-variant/70');
    } else {
      el.classList.remove('bg-gradient-to-br','from-primary','to-primary-container','text-white','rounded-full','shadow-[0_0_15px_rgba(183,159,255,0.4)]');
      el.classList.add('text-on-surface-variant/70');
    }
  });
}

// ── Form ──────────────────────────────────────────────
function resetForm() {
  document.getElementById('f-title').value    = '';
  document.getElementById('f-notes').value    = '';
  document.getElementById('f-deadline').value = '';
  formPriority = 'medium'; formCat = 'work';
  renderFormCats(); renderFormPriority();
}

function renderFormCats() {
  const g = document.getElementById('f-cat-group');
  g.innerHTML = Object.entries(CATS).map(([k,c]) => `
    <button type="button" onclick="setFormCat('${k}')"
      class="px-3 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest border-l-2 transition-all f-cat-btn ${formCat===k ? 'bg-surface-container-highest text-on-surface' : 'bg-surface-container-high text-on-surface-variant hover:bg-white/10'}"
      style="border-color:${c.color}" data-cat="${k}">
      ${c.label}
    </button>`).join('');
}

function renderFormPriority() {
  document.querySelectorAll('.f-priority-btn').forEach(b => {
    const p  = b.dataset.p;
    const ps = PRIORITY_STYLES[p];
    if (p === formPriority) {
      b.className = `flex-1 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all f-priority-btn ${ps.active}`;
    } else {
      b.className = `flex-1 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all f-priority-btn bg-surface-container-high text-on-surface-variant hover:bg-white/5`;
    }
  });
}

function setFormCat(c) { formCat = c; renderFormCats(); }
function setFormPriority(p) { formPriority = p; renderFormPriority(); }

// ── Error ─────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  document.getElementById('error-text').textContent = msg;
  el.classList.remove('hidden');
  el.classList.add('flex');
  void el.offsetWidth; // reflow for animation
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  setTimeout(hideError, 3500);
}
function hideError() {
  const el = document.getElementById('error-banner');
  el.classList.add('hidden'); el.classList.remove('flex');
}

// ── CRUD ──────────────────────────────────────────────
function submitTask() {
  const title = document.getElementById('f-title').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  if (!title)               { showError('Task title cannot be empty.'); return; }
  if (title.length > MAX_TITLE) { showError(`Title is too long — max ${MAX_TITLE} characters.`); return; }
  if (notes.length > MAX_NOTES) { showError(`Notes are too long — max ${MAX_NOTES} characters.`); return; }

  if (editId) {
    const t = tasks.find(t => t.id === editId);
    if (t) { t.title = title; t.notes = notes; t.priority = formPriority; t.cat = formCat; t.deadline = document.getElementById('f-deadline').value || null; }
  } else {
    tasks.unshift({
      id: Date.now(), title, notes, priority: formPriority, cat: formCat,
      deadline: document.getElementById('f-deadline').value || null,
      done: false,
      time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' })
    });
  }
  save(); showDashboard();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}
function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save(); render();
}
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (b.dataset.f === f) {
      b.className = 'px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest filter-btn active-filter';
    } else {
      b.className = 'px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest filter-btn glass-card ghost-border text-on-surface-variant';
    }
  });
  render();
}
function setCatFilter(c) { catFilter = c; render(); }
function save() { localStorage.setItem('taskos-v4', JSON.stringify(tasks)); }

// ── Render ────────────────────────────────────────────
function render() {
  document.getElementById('hero-date').textContent = heroDate();

  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const left  = total - done;
  const pct   = total ? Math.round((done/total)*100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent  = done;
  document.getElementById('stat-left').textContent  = left;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-wrap').style.display = total ? 'block' : 'none';
  document.getElementById('hero-sub').textContent = total
    ? `You have completed ${pct}% of your daily goals.`
    : 'Add your first task to get started.';

  // Category bar
  const counts = {};
  tasks.forEach(t => { counts[t.cat] = (counts[t.cat]||0)+1; });
  let catHtml = `<button onclick="setCatFilter('all')"
    class="px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${catFilter==='all'
      ? 'bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed shadow-lg shadow-primary/20'
      : 'glass-card ghost-border text-on-surface font-medium hover:bg-white/10'}">
    All Tasks
  </button>`;
  Object.entries(CATS).forEach(([k,c]) => {
    if (!counts[k]) return;
    catHtml += `<button onclick="setCatFilter('${k}')"
      class="px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${catFilter===k
        ? 'bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed shadow-lg shadow-primary/20'
        : 'glass-card ghost-border text-on-surface font-medium hover:bg-white/10'}">
      ${c.label} <span class="opacity-60 text-xs">${counts[k]}</span>
    </button>`;
  });
  document.getElementById('cat-bar').innerHTML = catHtml;

  // Cards
  const grid = document.getElementById('cards-grid');
  const visible = tasks.filter(t => {
    if (filter === 'active' && t.done)  return false;
    if (filter === 'done'   && !t.done) return false;
    if (catFilter !== 'all' && t.cat !== catFilter) return false;
    return true;
  });

  if (!visible.length) {
    grid.innerHTML = `<div class="col-span-full py-16 text-center text-on-surface-variant">
      <span class="material-symbols-outlined text-5xl opacity-30 block mb-3">inventory_2</span>
      <p class="text-sm font-medium">No tasks here yet.</p>
    </div>`;
    return;
  }

  grid.innerHTML = visible.map(t => {
    const cat = CATS[t.cat] || CATS.other;
    const dl  = fmtDeadline(t.deadline);
    const ps  = PRIORITY_STYLES[t.priority] || PRIORITY_STYLES.low;
    return `
    <div class="break-inside-avoid mb-4 glass-card ghost-border rounded-[1.5rem] p-5 relative overflow-hidden flex flex-col group hover:-translate-y-1 transition-transform duration-300 card-animate ${t.done?'opacity-50':''}">
      <!-- Category accent bar -->
      <div class="absolute top-0 left-0 w-1.5 h-full rounded-l-[1.5rem]" style="background:${cat.color};box-shadow:0 0 10px ${cat.color}66"></div>
      <!-- Top row -->
      <div class="flex justify-between items-start mb-3 pl-1">
        <span class="px-2.5 py-1 text-[10px] font-black tracking-widest uppercase rounded-lg ${ps.bg} ${ps.text}">${ps.label}</span>
        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onclick="showEditForm(${t.id})" class="w-7 h-7 rounded-full bg-white/10 hover:bg-primary/20 flex items-center justify-center transition-all active:scale-90" title="Edit">
            <span class="material-symbols-outlined text-primary text-base">edit</span>
          </button>
          <button onclick="deleteTask(${t.id})" class="w-7 h-7 rounded-full bg-white/10 hover:bg-error/20 flex items-center justify-center transition-all active:scale-90" title="Delete">
            <span class="material-symbols-outlined text-error text-base">close</span>
          </button>
        </div>
      </div>
      <!-- Title -->
      <h3 class="text-lg font-bold text-on-surface mb-1.5 leading-tight pl-1 ${t.done?'line-through opacity-60':''}">${escHtml(t.title)}</h3>
      <!-- Notes -->
      ${t.notes ? `<p class="text-sm text-on-surface-variant mb-3 pl-1 leading-relaxed">${escHtml(t.notes)}</p>` : ''}
      <!-- Footer -->
      <div class="mt-auto flex items-center justify-between pt-3 pl-1">
        <div class="flex items-center gap-3">
          ${dl ? `<div class="flex items-center gap-1 text-xs font-bold ${dl.overdue?'text-error':'text-on-surface-variant'}">
            <span class="material-symbols-outlined text-sm">${dl.overdue?'warning':'calendar_today'}</span>
            <span class="uppercase tracking-tighter">${dl.overdue?'Overdue':dl.label}</span>
          </div>` : `<span class="text-[10px] font-bold uppercase tracking-widest text-outline">${t.time}</span>`}
        </div>
        <div class="flex items-center gap-2">
          <span class="text-[10px] font-bold uppercase tracking-widest text-outline">${cat.label}</span>
          <button onclick="toggleTask(${t.id})"
            class="w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all active:scale-90 ${t.done ? 'bg-primary border-primary' : 'border-outline hover:border-primary'}"
            title="${t.done?'Undo':'Complete'}">
            ${t.done ? `<span class="material-symbols-outlined icon-fill text-on-primary text-sm">check</span>` : `<span class="material-symbols-outlined text-primary text-sm opacity-0 group-hover:opacity-100 transition-opacity">check</span>`}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderFormCats();
  renderFormPriority();
}

function escHtml(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Active filter style (injected via Tailwind) ───────
const styleEl = document.createElement('style');
styleEl.textContent = `
  .active-filter {
    background: linear-gradient(135deg, #b79fff, #ab8eff);
    color: #000;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(183,159,255,0.3);
  }
`;
document.head.appendChild(styleEl);

// ── Init ──────────────────────────────────────────────
renderFormCats();
renderFormPriority();
render();
</script>
</body>
</html>
